<!DOCTYPE html>
<html>
<head>
    <title>Employee Data</title>
    <style>
        table {
            width: 210mm; /* A4 width */
            max-width: 210mm;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            width: 25%; /* Divide table width evenly among 4 columns */
        }
    </style>
</head>
<body>
    <h1>Employee Data Search</h1>
    <input 
        type="text" 
        id="employeeNumber" 
        placeholder="Enter Employee Number" 
        style="width: 300px; font-size: 20px; padding: 10px; border: 2px solid #4CAF50; border-radius: 5px;"
    >
    <button onclick="searchEmployee()" style="font-size: 20px; padding: 10px;">Search</button>

    <table id="data-table">
        <thead>
            <tr></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        function searchEmployee() {
            const employeeNumber = document.getElementById('employeeNumber').value;
            fetch('data.csv')
                .then(response => response.text())
                .then(csv => {
                    const rows = csv.split('\n');
                    const table = document.getElementById('data-table');
                    const headerRow = table.querySelector('thead tr');
                    const body = table.querySelector('tbody');

                    // Clear previous results
                    headerRow.innerHTML = '';
                    body.innerHTML = '';

                    // Define headers for columns 1 and 3
                    const headers = ["Employee Number", "Name", "Job Title", "Location"];
                    headers.forEach(headerText => {
                        const header = document.createElement('th');
                        header.textContent = headerText;
                        headerRow.appendChild(header);
                    });

                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].split(',');
                        if (cells[0] === employeeNumber) { // Assuming employee number is in the first column
                            const row = document.createElement('tr');

                            // Create cells for columns 1, 2, 3, and 4
                            const dataCells = [cells[0], cells[1], cells[3], cells[4]]; // Employee Number, Name, Job Title, Location
                            dataCells.forEach(cellText => {
                                const cell = document.createElement('td');
                                cell.textContent = cellText;
                                row.appendChild(cell);
                            });

                            body.appendChild(row);
                            return; // Stop after finding the matching employee
                        }
                    }
                });
        }

        // Trigger search on Enter key press
        document.getElementById('employeeNumber').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                searchEmployee();
            }
        });
    </script>
</body>
</html>
