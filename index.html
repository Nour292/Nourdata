<!DOCTYPE html>
<html>
<head>
    <title>Nour Energy Data</title>
    <style>
        table {
            width: 210mm; /* A4 width */
            max-width: 210mm;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            width: 25%; /* Divide table width evenly among 4 columns */
        }
    </style>
</head>
<body>
    <h1>Nour Energy Data Search</h1>
    <input 
        type="text" 
        id="employeeNumber" 
        placeholder="Enter Employee Number" 
        style="width: 300px; font-size: 20px; padding: 10px; border: 2px solid #4CAF50; border-radius: 5px;"
    >
    <button onclick="searchEmployee()" style="font-size: 20px; padding: 10px;">Search</button>

    <table id="data-table">
        <tbody></tbody>
    </table>

    <script>
        function searchEmployee() {
            const employeeNumber = document.getElementById('employeeNumber').value;
            fetch('data.csv')
                .then(response => response.text())
                .then(csv => {
                    const rows = csv.split('\n');
                    const table = document.getElementById('data-table');
                    const body = table.querySelector('tbody');

                    // Clear previous results
                    body.innerHTML = '';

                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].split(',');
                        if (cells[0] === employeeNumber) { // Assuming employee number is in the first column

                            const headerMapping = {
                                "Employee Number": 0,
                                "Names": 1,
                                "Mobile Number": 2,
                                "Nationality": 3,
                                "Job Title": 4,
                                "Location": 5,
                                "Actual Location": 6,
                                "Joining Date": 7,
                                "Service Days": 8,
                                "Service Y,M,D": 9,
                                "DOB": 10,
                                "Days": 11,
                                "Age Y,M,D": 12,
                                "Total": 13,
                                "Basic": 14,
                                "Food": 15,
                                "Other": 16,
                                "Tr-10 %": 17,
                                "Other Trasp": 18,
                                "Housing 25%": 19,
                                "Housing": 20,
                                "Trasp Status": 21,
                                "Medical": 22,
                                "Contract": 23,
                                "Annual Leave": 24,
                                "Tickets": 25,
                                "Qiwa Starting": 26,
                                "Qiwa Ending": 27,
                                "Status": 28,
                                "Duty Hours": 29,
                                "Id No": 30,
                                "Id Profession": 31,
                                "Id Exp - Hijri": 32,
                                "Id Exp - Gregorian": 33,
                                "ID - Remaining Days": 34,
                                "PP number": 35,
                                "Issue Place": 36,
                                "Issue date": 37,
                                "Expiry date": 38,
                                "PP-Remaining Days": 39,
                                "Job Ended": 40,
                                "Total Service Days": 41,
                                "Total Service Y,M,D": 42,
                                "IBAN": 43,
                                "EMAIL": 44
                            };

                            const headers = Object.keys(headerMapping);

                            for (let j = 0; j < headers.length; j += 2) {
                                const row = document.createElement('tr');

                                // Header 1 and Value 1
                                const headerCell1 = document.createElement('th');
                                headerCell1.textContent = headers[j];
                                row.appendChild(headerCell1);

                                const valueCell1 = document.createElement('td');
                                valueCell1.textContent = cells[headerMapping[headers[j]]] || "N/A";
                                row.appendChild(valueCell1);

                                // Header 2 and Value 2 (if available)
                                if (j + 1 < headers.length) {
                                    const headerCell2 = document.createElement('th');
                                    headerCell2.textContent = headers[j + 1];
                                    row.appendChild(headerCell2);

                                    const valueCell2 = document.createElement('td');
                                    valueCell2.textContent = cells[headerMapping[headers[j + 1]]] || "N/A";
                                    row.appendChild(valueCell2);
                                }

                                body.appendChild(row);
                            }
                            return; // Stop after finding the matching employee
                        }
                    }
                });
            document.getElementById('employeeNumber').value = '';
        }

        // Trigger search on Enter key press
        document.getElementById('employeeNumber').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                searchEmployee();
            }
        });
    </script>
</body>
</html>
