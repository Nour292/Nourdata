<!DOCTYPE html>
<html>
<head>
    <title>Nour Energy Data</title>
    <style>
        /* ... your CSS ... */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent overlay */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #password-prompt {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="password-overlay">
        <div id="password-prompt">
            <label for="passwordInput">Enter Password:</label>
            <input type="password" id="passwordInput">
            <button id="passwordButton">Submit</button>
        </div>
    </div>

    <script>
        const passwordOverlay = document.getElementById('password-overlay');
        const passwordInput = document.getElementById('passwordInput');
        const passwordButton = document.getElementById('passwordButton');

        function checkPassword(password) {
            if (password !== "nour-pr") {
                alert("Incorrect password. Access denied.");
                return false;
            }
            passwordOverlay.style.display = 'none'; // Hide overlay
            return true;
        }

        passwordButton.addEventListener('click', function() {
            const password = passwordInput.value;
            checkPassword(password);
        });

        passwordInput.addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                const password = passwordInput.value;
                checkPassword(password);
            }
        });

        // Initial check on page load
        passwordOverlay.style.display = 'flex'; // Show overlay
    </script>

    <script>
        function searchEmployee() {
            // ... your searchEmployee() function ...
        }

        document.getElementById('employeeNumber').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                searchEmployee();
            }
        });
    </script>
    <div style="position: absolute; top: 10px; right: 10px;">
        <img src="logo.png" alt="Nour Energy Logo" style="max-height: 100px;">
    </div>
    <h1>Nour Energy Data Search</h1>
    <input 
        type="text" 
        id="employeeNumber" 
        placeholder="Enter Employee Number" 
        style="width: 300px; font-size: 20px; padding: 10px; border: 2px solid #4CAF50; border-radius: 5px;"
    >
    <button onclick="searchEmployee()" style="font-size: 20px; padding: 10px;">Search</button>

    <table id="data-table">
        <tbody></tbody>
    </table>

    <div id="footer-info"></div>
</body>
</html>
