<!DOCTYPE html>
<html>
<head>
    <title>Test Enter Key</title>
</head>
<body>
    <input type="text" id="testInput" placeholder="Enter something">

    <script>
        document.getElementById('testInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                alert('Enter key pressed!'); // Simple test alert
            }
        });
    </script>
</body>
</html>
