<!DOCTYPE html>
<html>
<head>
    <title>Employee Data</title>
    <style>
        table {
            width: 210mm; /* A4 width */
            max-width: 210mm;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Employee Data Search</h1>
    <input type="text" id="employeeNumber" placeholder="Enter Employee Number">
    <button onclick="searchEmployee()">Search</button>

    <table id="data-table">
        <thead>
            <tr></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        function searchEmployee() {
            const employeeNumber = document.getElementById('employeeNumber').value;
            fetch('data.csv')
                .then(response => response.text())
                .then(csv => {
                    const rows = csv.split('\n');
                    const table = document.getElementById('data-table');
                    const headerRow = table.querySelector('thead tr');
                    const body = table.querySelector('tbody');

                    // Clear previous results
                    headerRow.innerHTML = '';
                    body.innerHTML = '';

                    // Define headers for columns 1 and 3
                    const headers = ["Employee Number", "Name", "Job Title", "Location"];
                    headers.forEach(headerText => {
                        const header = document.createElement('th');
                        header.textContent = headerText;
                        headerRow.appendChild(header);
                    });

                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].split(',');
                        if (cells[0] === employeeNumber) { // Assuming employee number is in the first column
                            const row = document.createElement('tr');

                            // Create cells for columns 2 and 4
                            const dataCells = [cells[1], cells[3]]; // Name and Job Title
                            dataCells.forEach(cellText => {
                                const cell = document.createElement('td');
                                cell.textContent = cellText;
                                row.appendChild(cell);
                            });

                            // Create cells for employee number and location
                            const empNumCell = document.createElement('td');
                            empNumCell.textContent = cells[0];
                            row.appendChild(empNumCell);

                            const locationCell = document.createElement('td');
                            locationCell.textContent = cells[4];
                            row.appendChild(locationCell);

                            body.appendChild(row);
                            return; // Stop after finding the matching employee
                        }
                    }
                });
        }
    </script>
</body>
</html>
