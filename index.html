<script>
    function searchEmployee() {
        const employeeNumber = document.getElementById('employeeNumber').value;
        fetch('data.csv')
            .then(response => response.text())
            .then(csv => {
                const rows = csv.split('\n');
                const table = document.getElementById('data-table');
                const body = table.querySelector('tbody');

                // Clear previous results
                body.innerHTML = '';

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].split(',');
                    if (cells[0] === employeeNumber) { // Assuming employee number is in the first column

                        const headerMapping = {
                            "Employee Number": 0,
                            "Names": 1,
                            "Mobile Number": 2,
                            "Nationality": 3,
                            "Job Title": 4,
                            "Location": 5,
                            "Actual Location": 6,
                            "Joining Date": 7,
                            "Service Days": 8,
                            "Service Y,M,D": 9,
                            "DOB": 10,
                            "Days": 11,
                            "Age Y,M,D": 12,
                            "Total": 13,
                            "Basic": 14,
                            "Food": 15,
                            "Other": 16,
                            "Tr-10 %": 17,
                            "Other Trasp": 18,
                            "Housing 25%": 19,
                            "Housing": 20,
                            "Trasp Status": 21,
                            "Medical": 22,
                            "Contract": 23,
                            "Annual Leave": 24,
                            "Tickets": 25,
                            "Qiwa Starting": 26,
                            "Qiwa Ending": 27,
                            "Status": 28,
                            "Duty Hours": 29,
                            "Id No": 30,
                            "Id Profession": 31,
                            "Id Exp - Hijri": 32,
                            "Id Exp - Gregorian": 33,
                            "ID - Remaining Days": 34,
                            "PP number": 35,
                            "Issue Place": 36,
                            "Issue date": 37,
                            "Expiry date": 38,
                            "PP-Remaining Days": 39,
                            "Job Ended": 40,
                            "Total Service Days": 41,
                            "Total Service Y,M,D": 42,
                            "IBAN": 43,
                            "EMAIL": 44
                        };

                        for (const header in headerMapping) {
                            if (headerMapping.hasOwnProperty(header)) {
                                const rowIndex = document.createElement('tr');
                                const headerCell = document.createElement('th');
                                headerCell.textContent = header;
                                rowIndex.appendChild(headerCell);

                                const valueCell = document.createElement('td');
                                valueCell.textContent = cells[headerMapping[header]] || "N/A";
                                rowIndex.appendChild(valueCell);

                                body.appendChild(rowIndex);
                            }
                        }
                        return; // Stop after finding the matching employee
                    }
                }
            });
    }

    // Trigger search on Enter key press
    document.getElementById('employeeNumber').addEventListener('keyup', function(event) {
        if (event.key === 'Enter') {
            searchEmployee();
        }
    });
</script>
